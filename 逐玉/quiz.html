<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐玉角色人格测试</title>
    <style>
        :root {
            --sys-blue: #007AFF;
            --sys-blue-dark: #0A84FF;
            --sys-indigo: #5856D6;
            --sys-purple: #AF52DE;
            --sys-pink: #FF2D55;
            --sys-red: #FF3B30;
            --sys-green: #34C759;
            --sys-orange: #FF9500;
            --sys-yellow: #FFCC00;
            --sys-gray1: #8E8E93;
            --sys-gray2: #AEAEB2;
            --sys-gray3: #C7C7CC;
            --sys-gray4: #D1D1D6;
            --sys-gray5: #E5E5EA;
            --sys-gray6: #F2F2F7;
            --sys-black: #000000;
            --sys-white: #FFFFFF;
            --primary-gradient: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            --spacing-1x: 8px;
            --spacing-2x: 16px;
            --spacing-3x: 24px;
            --spacing-4x: 32px;
            --spacing-5x: 40px;
            --radius-s: 8px;
            --radius-m: 12px;
            --radius-l: 20px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --text-large-title: 31px;
            --text-title-1: 25px;
            --text-title-2: 19px;
            --text-title-3: 17px;
            --text-headline: 14px;
            --text-body: 14px;
            --leading-large-title: 38px;
            --leading-title-1: 31px;
            --leading-title-3: 22px;
            --leading-body: 19px;
            --avatar-xxl: 80px;
            --avatar-display: 96px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --sys-blue: #0A84FF;
                --sys-indigo: #5E5CE6;
                --sys-purple: #BF5AF2;
                --sys-pink: #FF375F;
                --sys-red: #FF453A;
                --sys-green: #30D158;
                --sys-orange: #FF9F0A;
                --sys-yellow: #FFD60A;
                --sys-gray1: #8E8E93;
                --sys-gray2: #636366;
                --sys-gray3: #48484A;
                --sys-gray4: #3A3A3C;
                --sys-gray5: #2C2C2E;
                --sys-gray6: #1C1C1E;
                --sys-black: #FFFFFF;
                --sys-white: #000000;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "PingFang SC", sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            padding: var(--spacing-2x);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--sys-white);
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        @media (prefers-color-scheme: dark) {
            .container { background: var(--sys-gray6); }
        }

        .page {
            padding: var(--spacing-4x) var(--spacing-3x);
            display: none;
            min-height: 500px;
        }

        .page.active { display: block; }

        h1 {
            text-align: center;
            color: var(--sys-black);
            font-size: var(--text-large-title);
            font-weight: 400;
            line-height: var(--leading-large-title);
            margin-bottom: var(--spacing-2x);
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: var(--sys-gray1);
            font-size: var(--text-body);
            line-height: var(--leading-body);
            margin-bottom: var(--spacing-4x);
        }

        .btn {
            display: block;
            width: 100%;
            padding: var(--spacing-2x) var(--spacing-3x);
            background: var(--primary-gradient);
            color: var(--sys-white);
            border: none;
            border-radius: var(--radius-full);
            font-size: var(--text-headline);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-align: center;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { opacity: 0.95; }
        .btn:active { transform: scale(0.98); }

        .progress {
            height: 4px;
            background: var(--sys-gray5);
            margin-bottom: var(--spacing-3x);
            border-radius: 2px;
            overflow: hidden;
        }

        @media (prefers-color-scheme: dark) { .progress { background: var(--sys-gray4); } }

        .progress-bar {
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: var(--text-title-3);
            color: var(--sys-black);
            margin-bottom: var(--spacing-3x);
            line-height: var(--leading-title-3);
            font-weight: 500;
        }

        @media (prefers-color-scheme: dark) {
            .question-text, .result-name, .result-desc { color: var(--sys-white); }
            .subtitle, .result-actor, .result-quote { color: var(--sys-gray2); }
        }

        .options { display: flex; flex-direction: column; gap: var(--spacing-2x); }

        .option {
            padding: var(--spacing-2x);
            border: 2px solid var(--sys-gray4);
            border-radius: var(--radius-m);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: var(--text-body);
            color: var(--sys-black);
            background: var(--sys-white);
            display: flex;
            align-items: center;
            min-height: 52px;
        }

        @media (prefers-color-scheme: dark) {
            .option { background: var(--sys-gray5); border-color: var(--sys-gray4); color: var(--sys-white); }
            .option:hover { background: var(--sys-gray4); }
        }

        .option:hover { border-color: var(--sys-orange); background: var(--sys-gray6); }
        .option.selected { border-color: var(--sys-orange); background: var(--sys-orange); color: var(--sys-white); }

        .intro-badge {
            display: inline-block;
            padding: var(--spacing-1x) var(--spacing-2x);
            background: var(--sys-gray6);
            color: var(--sys-gray1);
            border-radius: var(--radius-full);
            font-size: var(--text-footnote);
            margin-bottom: var(--spacing-2x);
        }

        @media (prefers-color-scheme: dark) { .intro-badge { background: var(--sys-gray5); } }

        .sphere-container {
            width: 100%;
            height: 280px;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: var(--spacing-3x) 0;
        }

        .sphere {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: rotateSphere 20s linear infinite;
        }

        @keyframes rotateSphere {
            from { transform: rotateY(0deg) rotateX(0deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        .sphere-img {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--sys-white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-origin: center;
            animation: float3d 3s ease-in-out infinite;
        }

        .sphere-img:hover {
            transform: scale(1.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 100;
        }

        @keyframes float3d {
            0%, 100% { transform: translateZ(0); }
            50% { transform: translateZ(10px); }
        }

        .result-avatar {
            width: 50%;
            max-width: 250px;
            aspect-ratio: 1;
            margin: 0 auto var(--spacing-3x);
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--sys-orange);
            background: var(--sys-gray5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .result-avatar .emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8vw; }

        .result-name {
            text-align: center;
            font-size: var(--text-title-1);
            font-weight: 600;
            color: var(--sys-black);
            margin-bottom: var(--spacing-1x);
        }

        .result-actor { text-align: center; color: var(--sys-gray1); font-size: var(--text-subhead); margin-bottom: var(--spacing-2x); }

        .result-desc {
            color: var(--sys-black);
            font-size: var(--text-body);
            line-height: var(--leading-body);
            margin-bottom: var(--spacing-3x);
            padding: var(--spacing-2x);
            background: var(--sys-gray6);
            border-radius: var(--radius-m);
        }

        @media (prefers-color-scheme: dark) {
            .result-desc, .result-quote, .trait-tag { background: var(--sys-gray5); }
        }

        .result-traits {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-1x);
            justify-content: center;
            margin-bottom: var(--spacing-3x);
        }

        .trait-tag {
            padding: var(--spacing-1x) var(--spacing-2x);
            background: var(--primary-gradient);
            color: var(--sys-white);
            border-radius: var(--radius-full);
            font-size: var(--text-caption);
            font-weight: 500;
        }

        .result-quote {
            text-align: center;
            color: var(--sys-gray1);
            font-style: italic;
            margin-bottom: var(--spacing-3x);
            padding: var(--spacing-2x);
            border-left: 3px solid var(--sys-orange);
            background: var(--sys-gray6);
            border-radius: 0 var(--radius-m) var(--radius-m) 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-page" class="page active">
            <h1>逐玉角色人格测试</h1>
            <p class="subtitle">测测你更像《逐玉》中的哪个角色</p>
            <div class="sphere-container">
                <div class="sphere" id="sphere-start"></div>
            </div>
            <div style="text-align: center;">
                <span class="intro-badge">20题 · 8个角色</span>
            </div>
            <button class="btn" onclick="startQuiz()">开始测试</button>
        </div>
        
        <div id="question-page" class="page">
            <div class="progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
        </div>
        
        <div id="result-page" class="page">
            <h1>测试结果</h1>
            <div class="sphere-container">
                <div class="sphere" id="sphere"></div>
            </div>
            <div class="result-avatar" id="result-avatar"></div>
            <div class="result-name" id="result-name"></div>
            <div class="result-actor" id="result-actor"></div>
            <div class="result-traits" id="result-traits"></div>
            <div class="result-desc" id="result-desc"></div>
            <div class="result-quote" id="result-quote"></div>
            <button class="btn" onclick="location.reload()">重新测试</button>
        </div>
    </div>

    <script>
        const questions = [
            {"id": 1, "text": "如果你遇到不公平的事情，你会怎么做？", "options": [{"text": "直接冲上去理论，寸步不让", "character": "樊长玉"}, {"text": "暗中收集证据，等待时机", "character": "齐旻"}, {"text": "先看看能不能和平解决", "character": "李怀安"}, {"text": "找机会曲线救国", "character": "公孙鄞"}]},
            {"id": 2, "text": "你的朋友失恋了，你会怎么安慰？", "options": [{"text": "带她去吃好吃的，转移注意力", "character": "俞浅浅"}, {"text": "默默陪在她身边，给她依靠", "character": "李怀安"}, {"text": "帮她分析问题，给出建议", "character": "公孙鄞"}, {"text": "带她去喝酒，一醉解千愁", "character": "樊长玉"}]},

            {"id": 4, "text": "当你发现有人在背后说你坏话，你会？", "options": [{"text": "直接找他对质", "character": "樊长玉"}, {"text": "装作不在乎，暗中观察", "character": "齐旻"}, {"text": "反思自己是不是有做的不对的地方", "character": "李怀安"}, {"text": "以其人之道还治其人之身", "character": "谢征"}]},
            {"id": 5, "text": "你最喜欢的休闲方式是？", "options": [{"text": "到处游玩，结交新朋友", "character": "俞浅浅"}, {"text": "独自思考，看看书", "character": "公孙鄞"}, {"text": "和喜欢的人在一起，做什么都好", "character": "李怀安"}, {"text": "计划下一次冒险", "character": "樊长玉"}]},

            {"id": 9, "text": "你更喜欢什么样的生活方式？", "options": [{"text": "充满刺激和挑战", "character": "樊长玉"}, {"text": "平静安稳，岁月静好", "character": "李怀安"}, {"text": "不断学习，提升自己", "character": "齐旻"}, {"text": "自由洒脱，无拘无束", "character": "俞浅浅"}]},

            {"id": 12, "text": "你更看重朋友的什么特质？", "options": [{"text": "真诚坦率", "character": "樊长玉"}, {"text": "温柔体贴", "character": "李怀安"}, {"text": "聪明睿智", "character": "齐旻"}, {"text": "有趣可爱", "character": "俞浅浅"}]},
            {"id": 13, "text": "当你做错事时，你会？", "options": [{"text": "勇于承认，立刻道歉", "character": "樊长玉"}, {"text": "找借口掩饰", "character": "齐旻"}, {"text": "内疚自责，难以释怀", "character": "李怀安"}, {"text": "想办法弥补", "character": "谢征"}]},

            {"id": 17, "text": "当你压力大时，你会？", "options": [{"text": "找朋友倾诉", "character": "俞浅浅"}, {"text": "独自承受", "character": "谢征"}, {"text": "运动发泄", "character": "樊长玉"}, {"text": "冷静思考对策", "character": "齐旻"}]},

            "公孙鄞": {"name": "公孙鄞", "actor": "李卿", "description": "你更像《逐玉》中的公孙鄞！神秘莫测，保持着冷静与理性。", "traits": ["神秘莫测", "冷静理性", "高深莫测", "旁观者"], "quote": "一切尽在掌握中。", "avatar": "🎯", "imageUrl": "https://pix2.tvzhe.com/thumb/character/474/991/260x346.jpg"},
            "齐姝": {"name": "齐姝", "actor": "喻钟黎", "description": "你更像《逐玉》中的齐姝！温柔婉约，才情出众的才女。", "traits": ["温柔婉约", "才情出众", "知书达理", "贤淑型"], "quote": "琴棋书画，样样精通。", "avatar": "📜", "imageUrl": "https://pix2.tvzhe.com/thumb/drama/161/36/270x360.jpg"},
            "赵大娘": {"name": "赵大娘", "actor": "刘琳", "description": "你更像《逐玉》中的赵大娘！慈祥善良，是最接地气的存在。", "traits": ["慈祥善良", "接地气", "热心肠", "慈母型"], "quote": "孩子，慢点吃。", "avatar": "❤️", "imageUrl": "https://pix2.tvzhe.com/thumb/drama/161/36/270x360.jpg"}
        };

        let currentQuestion = 0;
        let scores = {};
        
        for (let key in characters) {
            scores[key] = 0;
        }

        function createSphere(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            
            const charKeys = Object.keys(characters);
            const radius = 80;
            
            charKeys.forEach((key, index) => {
                const char = characters[key];
                const phi = Math.acos(-1 + (2 * index) / charKeys.length);
                const theta = Math.sqrt(charKeys.length * Math.PI) * phi;
                
                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);
                
                const img = document.createElement('img');
                img.className = 'sphere-img';
                img.src = char.imageUrl || '';
                img.alt = char.name;
                img.title = char.name;
                img.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                
                const randomDelay = Math.random() * 2;
                const randomDuration = 2 + Math.random() * 2;
                img.style.animationDelay = `${randomDelay}s`;
                img.style.animationDuration = `${randomDuration}s`;
                
                img.onerror = function() {
                    this.style.display = 'none';
                };
                
                container.appendChild(img);
            });
        }

        function startQuiz() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.text;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt.character);
                optionsDiv.appendChild(btn);
            });
        }

        function selectOption(character) {
            scores[character]++;
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let maxScore = 0;
            let resultCharacter = '樊长玉';
            
            for (let key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultCharacter = key;
                }
            }
            
            const char = characters[resultCharacter];
            
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            
            createSphere('sphere');
            
            const avatarDiv = document.getElementById('result-avatar');
            if (char.imageUrl) {
                avatarDiv.innerHTML = `<img src="${char.imageUrl}" onerror="this.parentNode.innerHTML='<div class=\\'emoji\\'>${char.avatar}</div>'">`;
            } else {
                avatarDiv.innerHTML = `<div class="emoji">${char.avatar}</div>`;
            }
            
            document.getElementById('result-name').textContent = char.name;
            document.getElementById('result-actor').textContent = '饰演者：' + char.actor;
            document.getElementById('result-desc').textContent = char.description;
            document.getElementById('result-quote').textContent = '「' + char.quote + '」';
            
            const traitsDiv = document.getElementById('result-traits');
            traitsDiv.innerHTML = '';
            char.traits.forEach(trait => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = trait;
                traitsDiv.appendChild(tag);
            });
        }
        
        function initSpheres() {
            createSphere('sphere');
            createSphere('sphere-start');
        }
        
        window.onload = initSpheres;
    </script>
</body>
</html>
