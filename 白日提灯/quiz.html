<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白日提灯 - 角色人格测试</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #e94560 0%, #c44569 100%);
            --spacing-1x: 8px;
            --spacing-2x: 16px;
            --spacing-3x: 24px;
            --spacing-4x: 32px;
            --radius-s: 8px;
            --radius-m: 12px;
            --radius-l: 20px;
            --radius-full: 9999px;
            --text-large-title: 31px;
            --text-title-1: 25px;
            --text-title-3: 17px;
            --text-headline: 14px;
            --text-body: 14px;
            --leading-large-title: 38px;
            --leading-title-3: 22px;
            --leading-body: 19px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding: var(--spacing-4x) var(--spacing-3x);
        }

        .page.active { display: block; }

        h1 {
            text-align: center;
            color: #e94560;
            font-size: var(--text-large-title);
            font-weight: 700;
            line-height: var(--leading-large-title);
            margin-bottom: var(--spacing-2x);
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: var(--text-body);
            margin-bottom: var(--spacing-3x);
        }

        .btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            padding: var(--spacing-2x) var(--spacing-3x);
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: var(--radius-full);
            font-size: var(--text-headline);
            font-weight: 600;
            cursor: pointer;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { opacity: 0.95; transform: scale(1.02); }

        .progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: var(--spacing-3x);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: var(--text-title-3);
            color: #fff;
            margin-bottom: var(--spacing-3x);
            line-height: var(--leading-title-3);
            font-weight: 500;
        }

        .options { display: flex; flex-direction: column; gap: var(--spacing-2x); }

        .option {
            padding: var(--spacing-2x);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-m);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: var(--text-body);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            min-height: 52px;
        }

        .option:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.2); transform: translateX(5px); }
        .option.selected { border-color: #e94560; background: linear-gradient(135deg, #e94560, #c44569); }

        .intro-badge {
            display: inline-block;
            padding: var(--spacing-1x) var(--spacing-2x);
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-full);
            font-size: 12px;
            margin-bottom: var(--spacing-2x);
        }

        .sphere-container {
            width: 100%;
            height: 280px;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: var(--spacing-3x) 0;
        }

        .sphere {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: rotateSphere 20s linear infinite;
        }

        @keyframes rotateSphere {
            from { transform: rotateY(0deg) rotateX(0deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        .sphere-avatar {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transform-origin: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: float3d 3s ease-in-out infinite;
        }

        @keyframes float3d {
            0%, 100% { transform: translateZ(0); }
            50% { transform: translateZ(10px); }
        }

        .result-avatar {
            width: 60%;
            max-width: 280px;
            aspect-ratio: 1;
            margin: 0 auto var(--spacing-3x);
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #e94560;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .result-name {
            text-align: center;
            font-size: var(--text-title-1);
            font-weight: 600;
            color: #e94560;
            margin-bottom: var(--spacing-1x);
        }

        .result-actor { text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: var(--spacing-2x); }

        .result-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: var(--text-body);
            line-height: var(--leading-body);
            margin-bottom: var(--spacing-3x);
            padding: var(--spacing-2x);
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-m);
            text-align: center;
        }

        .result-traits {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-1x);
            justify-content: center;
            margin-bottom: var(--spacing-3x);
        }

        .trait-tag {
            padding: var(--spacing-1x) var(--spacing-2x);
            background: var(--primary-gradient);
            color: #fff;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
        }

        .result-quote {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            margin-bottom: var(--spacing-3x);
            padding: var(--spacing-2x);
            border-left: 3px solid #e94560;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 var(--radius-m) var(--radius-m) 0;
        }

        .question-number {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .result-avatar { width: 80vw; max-width: none; font-size: 40vw; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-page" class="page active">
            <h1>白日提灯</h1>
            <p class="subtitle">测测你更像《白日提灯》中的哪个角色</p>
            <div style="text-align: center;">
                <span class="intro-badge">20题 · 6个角色</span>
            </div>
            <div class="sphere-container">
                <div class="sphere" id="sphere-start"></div>
            </div>
            <button class="btn" onclick="startQuiz()">开始测试</button>
        </div>
        
        <div id="question-page" class="page">
            <div class="progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-number" id="question-number"></div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
        </div>
        
        <div id="result-page" class="page">
            <h1>测试结果</h1>
            <div class="sphere-container">
                <div class="sphere" id="sphere"></div>
            </div>
            <div class="result-avatar" id="result-avatar"></div>
            <div class="result-name" id="result-name"></div>
            <div class="result-actor" id="result-actor"></div>
            <div class="result-traits" id="result-traits"></div>
            <div class="result-desc" id="result-desc"></div>
            <div class="result-quote" id="result-quote"></div>
            <button class="btn" onclick="location.reload()">重新测试</button>
        </div>
    </div>

    <script>
        let questions = [
            {"id": 1, "text": "面对强大的敌人，你会选择？", "options": [{"text": "以绝对的力量压制", "character": "贺思慕"}, {"text": "用计谋智取", "character": "段胥"}, {"text": "暗中操控局势", "character": "晏柯"}, {"text": "寻找盟友共同对抗", "character": "姜艾"}]},
            {"id": 2, "text": "你更看重什么？", "options": [{"text": "职责与使命", "character": "贺思慕"}, {"text": "真相与正义", "character": "段胥"}, {"text": "权力与地位", "character": "晏柯"}, {"text": "忠诚与情义", "character": "沉英"}]},
            {"id": 3, "text": "面对失去，你会怎么做？", "options": [{"text": "独自承受，坚强面对", "character": "贺思慕"}, {"text": "执着追寻，不放弃", "character": "段胥"}, {"text": "隐忍蛰伏，等待时机", "character": "晏柯"}, {"text": "珍惜当下，乐观生活", "character": "姜艾"}]},
            {"id": 4, "text": "你更擅长什么？", "options": [{"text": "感知与守护", "character": "贺思慕"}, {"text": "战斗与领导", "character": "段胥"}, {"text": "谋划与布局", "character": "晏柯"}, {"text": "经营与管理", "character": "姜艾"}]},
            {"id": 5, "text": "你的感情表达方式是？", "options": [{"text": "沉默守护，用行动证明", "character": "贺思慕"}, {"text": "热烈直接，奋不顾身", "character": "段胥"}, {"text": "隐忍克制，压抑情感", "character": "晏柯"}, {"text": "飞蛾扑火，执着付出", "character": "颜璋"}]},
            {"id": 6, "text": "面对规则和秩序，你会？", "options": [{"text": "严格遵守，维护秩序", "character": "贺思慕"}, {"text": "质疑规则，追寻真相", "character": "段胥"}, {"text": "利用规则达成目的", "character": "晏柯"}, {"text": "在规则内灵活变通", "character": "姜艾"}]},
            {"id": 7, "text": "你更欣赏什么样的人？", "options": [{"text": "忠诚可靠的人", "character": "姜艾"}, {"text": "勇敢正直的人", "character": "段胥"}, {"text": "聪明有野心的人", "character": "晏柯"}, {"text": "温暖善良的人", "character": "沉英"}]},
            {"id": 8, "text": "当你犯错时，你会？", "options": [{"text": "承认错误，承担后果", "character": "段胥"}, {"text": "掩饰错误，保护自己", "character": "晏柯"}, {"text": "反思自己，寻求改变", "character": "贺思慕"}, {"text": "寻求帮助，继续前进", "character": "沉英"}]},
            {"id": 9, "text": "你更看重什么品质？", "options": [{"text": "坚韧不拔", "character": "贺思慕"}, {"text": "勇敢无畏", "character": "段胥"}, {"text": "智慧谋略", "character": "晏柯"}, {"text": "通透善良", "character": "姜艾"}]},
            {"id": 10, "text": "面对艰难抉择，你会？", "options": [{"text": "牺牲自我，成全大局", "character": "段胥"}, {"text": "权衡利弊，做出选择", "character": "晏柯"}, {"text": "坚守底线，绝不妥协", "character": "贺思慕"}, {"text": "顺其自然，随遇而安", "character": "姜艾"}]},
            {"id": 11, "text": "你更喜欢哪种生活方式？", "options": [{"text": "承担责任，服务他人", "character": "贺思慕"}, {"text": "追求理想，建功立业", "character": "段胥"}, {"text": "掌控全局，站在顶端", "character": "晏柯"}, {"text": "平静安稳，享受生活", "character": "沉英"}]},
            {"id": 12, "text": "你如何对待敌人？", "options": [{"text": "以暴制暴，绝不手软", "character": "晏柯"}, {"text": "依法惩处，维护正义", "character": "段胥"}, {"text": "以牙还牙，睚眦必报", "character": "颜璋"}, {"text": "化解仇恨，给机会", "character": "贺思慕"}]},
            {"id": 13, "text": "面对压力时，你会？", "options": [{"text": "冷静分析，寻找突破口", "character": "段胥"}, {"text": "独自承受，默默承担", "character": "贺思慕"}, {"text": "暗中筹谋，等待机会", "character": "晏柯"}, {"text": "倾诉分享，获得支持", "character": "沉英"}]},
            {"id": 14, "text": "你更看重什么关系？", "options": [{"text": "君臣之谊，忠诚相待", "character": "姜艾"}, {"text": "知己之交，心意相通", "character": "段胥"}, {"text": "主仆之情，誓死追随", "character": "颜璋"}, {"text": "姐弟之情，血浓于水", "character": "沉英"}]},
            {"id": 15, "text": "你如何定义成功？", "options": [{"text": "守护想守护的人", "character": "贺思慕"}, {"text": "实现理想，证明自己", "character": "段胥"}, {"text": "掌控命运，站在巅峰", "character": "晏柯"}, {"text": "平安喜乐，家庭和睦", "character": "姜艾"}]},
            {"id": 16, "text": "面对背叛，你会？", "options": [{"text": "愤怒但克制，追查真相", "character": "段胥"}, {"text": "冷静应对，收集证据", "character": "晏柯"}, {"text": "心寒失望，选择放手", "character": "贺思慕"}, {"text": "理解包容，给机会", "character": "沉英"}]},
            {"id": 17, "text": "你最害怕什么？", "options": [{"text": "失去使命的意义", "character": "贺思慕"}, {"text": "失去重要的人", "character": "段胥"}, {"text": "失去权力和控制", "character": "晏柯"}, {"text": "失去平静的生活", "character": "姜艾"}]},
            {"id": 18, "text": "你更愿意为什么付出一切？", "options": [{"text": "维护人灵秩序", "character": "贺思慕"}, {"text": "守护家国天下", "character": "段胥"}, {"text": "守护心中所爱", "character": "颜璋"}, {"text": "守护家人和所爱", "character": "沉英"}]},
            {"id": 19, "text": "面对选择，你会？", "options": [{"text": "顾全大局，牺牲小我", "character": "段胥"}, {"text": "坚持自我，不被左右", "character": "贺思慕"}, {"text": "审时度势，随机应变", "character": "晏柯"}, {"text": "跟随内心，顺其自然", "character": "姜艾"}]},
            {"id": 20, "text": "你理想的人生是？", "options": [{"text": "承担使命，守护苍生", "character": "贺思慕"}, {"text": "驰骋疆场，建功立业", "character": "段胥"}, {"text": "运筹帷幄，掌控一切", "character": "晏柯"}, {"text": "岁月静好，现世安稳", "character": "沉英"}]}
        ];

        const characters = {
            "贺思慕": {"name": "贺思慕", "actor": "迪丽热巴", "description": "统御归墟四百年的鬼王，天生缺失五感，白天伪装成柔弱孤女\"贺小小\"，夜晚化身白发红衣的万灵之主。", "traits": ["清冷", "深情", "强大", "孤独"], "quote": "人鬼殊途，我不认。", "avatar": "🕯️"},
            "段胥": {"name": "段胥", "actor": "陈飞宇", "description": "背负灭门血仇的少年将军，表面意气风发，实则童年被囚禁。阳光笑容下藏着阴郁偏执。", "traits": ["坚韧", "深情", "腹黑", "成长"], "quote": "我赌你会来找我。", "avatar": "⚔️"},
            "晏柯": {"name": "晏柯", "actor": "魏哲鸣", "description": "前朝皇子，为夺权勾结叛灵，意图颠覆人灵两界。表面温润，实则阴险腹黑。", "traits": ["阴险", "权谋", "深情", "偏执"], "quote": "这天下，本该是我的。", "avatar": "🎭"},
            "姜艾": {"name": "姜艾", "actor": "张俪", "description": "归墟左丞，与右丞晏柯并称鬼界双柱。是贺思慕三百年最忠诚的心腹，行事毒舌通透。", "traits": ["毒舌", "忠诚", "通透", "首富"], "quote": "钱是赚不完的，但命只有一条。", "avatar": "💰"},
            "沉英": {"name": "沉英", "actor": "徐崴罗", "description": "被贺思慕救下的少年，对其产生强烈依赖。后成长为保家卫国的战士，最终成为归墟之主。", "traits": ["忠诚", "依赖", "成长", "勇敢"], "quote": "姐姐，我来守护你。", "avatar": "🛡️"},
            "颜璋": {"name": "颜璋", "actor": "安悦溪", "description": "前世被心上人背叛惨死，被晏柯复仇收留。对晏柯痴心一片，明知被利用仍飞蛾扑火。", "traits": ["痴情", "忠贞", "悲剧", "执念"], "quote": "为你，我愿付出一切。", "avatar": "🔥"}
        };

        let currentQuestion = 0;
        let scores = {};
        
        for (let key in characters) {
            scores[key] = 0;
        }

        function createSphere(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            
            const charKeys = Object.keys(characters);
            const radius = 80;
            
            charKeys.forEach((key, index) => {
                const char = characters[key];
                const phi = Math.acos(-1 + (2 * index) / charKeys.length);
                const theta = Math.sqrt(charKeys.length * Math.PI) * phi;
                
                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);
                
                const div = document.createElement('div');
                div.className = 'sphere-avatar';
                div.textContent = char.avatar;
                div.title = char.name;
                div.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                
                const randomDelay = Math.random() * 2;
                const randomDuration = 2 + Math.random() * 2;
                div.style.animationDelay = `${randomDelay}s`;
                div.style.animationDuration = `${randomDuration}s`;
                
                container.appendChild(div);
            });
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startQuiz() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            currentQuestion = 0;
            for (let key in scores) { scores[key] = 0; }
            questions = shuffleArray(questions);
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;
            document.getElementById('question-text').textContent = q.text;
            
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            const shuffledOptions = shuffleArray([...q.options]);
            
            shuffledOptions.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt.character, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function selectOption(character, btn) {
            scores[character]++;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            btn.classList.add('selected');
            
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 300);
        }

        function showResult() {
            let maxScore = 0;
            let resultCharacter = '贺思慕';
            
            for (let key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultCharacter = key;
                }
            }
            
            const char = characters[resultCharacter];
            
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            
            createSphere('sphere');
            
            document.getElementById('result-avatar').textContent = char.avatar;
            document.getElementById('result-name').textContent = char.name;
            document.getElementById('result-actor').textContent = '饰演者：' + char.actor;
            document.getElementById('result-desc').textContent = char.description;
            document.getElementById('result-quote').textContent = '「' + char.quote + '」';
            
            const traitsDiv = document.getElementById('result-traits');
            traitsDiv.innerHTML = '';
            char.traits.forEach(trait => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = trait;
                traitsDiv.appendChild(tag);
            });
        }
        
        function initSpheres() {
            createSphere('sphere');
