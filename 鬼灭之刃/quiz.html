            "蝴蝶忍": {"name": "蝴蝶忍", "actor": "悠木碧", "description": "你更像《鬼灭之刃》中的蝴蝶忍！外表温柔可爱，实际上是毒杀高手。", "traits": ["腹黑可爱", "毒舌", "聪明伶俐", "温柔腹黑"], "quote": "真是可爱呢。", "avatar": "🦋", "imageUrl": "https://pix2.tvzhe.com/thumb/star/48/347/260x346.jpg"},
            "炼狱杏寿郎": {"name": "炼狱杏寿郎", "actor": "日野聪", "description": "你更像《鬼灭之刃》中的炼狱杏寿郎！热情开朗，是炎柱，有着我燃烧般的灵魂！", "traits": ["热情开朗", "充满活力", "正义感强", "热血"], "quote": "我会保护大家！", "avatar": "🔥", "imageUrl": "https://pix2.tvzhe.com/images/default/character_avatar_260x346.jpg"},
            "甘露寺蜜璃": {"name": "甘露寺蜜璃", "actor": "花守ゆみり", "description": "你更像《鬼灭之刃》中的甘露寺蜜璃！温柔可爱，恋爱时会变得超级强，是恋柱！", "traits": ["温柔可爱", "恋爱脑", "纯真热情", "力大无穷"], "quote": "我喜欢强大的人！", "avatar": "💗", "imageUrl": "https://pix2.tvzhe.com/images/default/character_avatar_260x346.jpg"}
        };

        let currentQuestion = 0;
        let scores = {};
        
        for (let key in characters) {
            scores[key] = 0;
        }

        function startQuiz() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            showQuestion();
        }

        function createSphere(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            
            const charKeys = Object.keys(characters);
            const radius = 80;
            
            charKeys.forEach((key, index) => {
                const char = characters[key];
                const phi = Math.acos(-1 + (2 * index) / charKeys.length);
                const theta = Math.sqrt(charKeys.length * Math.PI) * phi;
                
                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);
                
                const img = document.createElement('img');
                img.className = 'sphere-img';
                img.src = char.imageUrl || '';
                img.alt = char.name;
                img.title = char.name;
                img.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
                img.onerror = function() {
                    this.style.display = 'none';
                };
                
                container.appendChild(img);
            });
        }

        function initSpheres() {
            createSphere('sphere');
            createSphere('sphere-start');
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.text;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt.character);
                optionsDiv.appendChild(btn);
            });
        }

        function selectOption(character) {
            scores[character]++;
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let maxScore = 0;
            let resultCharacter = '灶门炭治郎';
            
            for (let key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultCharacter = key;
                }
            }
            
            const char = characters[resultCharacter];
            
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            
            createSphere('sphere');
            
            const avatarDiv = document.getElementById('result-avatar');
            if (char.imageUrl) {
                avatarDiv.innerHTML = `<img src="${char.imageUrl}" onerror="this.parentNode.innerHTML='<div class=\\'emoji\\'>${char.avatar}</div>'">`;
            } else {
                avatarDiv.innerHTML = `<div class="emoji">${char.avatar}</div>`;
            }
            
            document.getElementById('result-name').textContent = char.name;
            document.getElementById('result-actor').textContent = '配音：' + char.actor;
            document.getElementById('result-desc').textContent = char.description;
            document.getElementById('result-quote').textContent = '「' + char.quote + '」';
            
            const traitsDiv = document.getElementById('result-traits');
            traitsDiv.innerHTML = '';
            char.traits.forEach(trait => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = trait;
                traitsDiv.appendChild(tag);
            });
        }
        
        window.onload = initSpheres;
    </script>
</body>
</html>
